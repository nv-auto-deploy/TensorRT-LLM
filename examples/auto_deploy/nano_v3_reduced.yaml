runtime: trtllm
compile_backend: torch-cudagraph
max_batch_size: 384
max_seq_len: 65536 # tunable
enable_chunked_prefill: true
attn_backend: trtllm
model_factory: AutoModelForCausalLM
skip_loading_weights: false
cuda_graph_batch_sizes: [1, 2, 4, 8, 16, 24, 32, 64, 128, 256, 320, 384]
kv_cache_config:
  free_gpu_memory_fraction: 0.88
  mamba_ssm_cache_dtype: auto
model_kwargs:
  num_hidden_layers: 6  # reduced: covers MEMEM* (Mamba, MoE, Attention)
transforms:
  detect_sharding:
    allreduce_strategy: SYMM_MEM
    sharding_dims: ['ep', 'bmm']
    sharding_source: ['manual']
    manual_config:
      head_dim: 128
      tp_plan:
        "in_proj": "mamba"
        "out_proj": "rowwise"
        "q_proj": "colwise"
        "k_proj": "colwise"
        "v_proj": "colwise"
        "o_proj": "rowwise"
        "up_proj": "colwise"
        "down_proj": "rowwise"
        "fc1_latent_proj": "gather"
        "fc2_latent_proj": "gather"
  multi_stream_moe:
    stage: compile
    enabled: true
  gather_logits_before_lm_head:
    enabled: true
  fuse_mamba_a_log:
    stage: post_load_fusion
    enabled: true
  insert_cached_ssm_attention:
    backend: flashinfer_ssm  # iter30: adaptive dispatch (flashinfer≤32, Triton>32) + pure-decode fast path (skip torch.zeros+copy_)
  fuse_conv_ssm:
    enabled: false  # iter20 regressed TTFT +3.5% (44.61→46.17ms) with only -0.3% TPOT gain (noise)
  fuse_relu2_quant_fp8:
    enabled: true
  fuse_rmsnorm_quant_fp8:
    enabled: true  # iter33: adaptive dispatch (FlashInfer<=32, Triton>32); FlashInfer avoids Triton overhead at B=1
  fuse_causal_conv_activation:
    enabled: true  # iter29: decode-only fusion — prefill uses activation=None + inline silu (avoids large-batch regression), decode uses fused silu (saves kernel launch per Mamba layer)
