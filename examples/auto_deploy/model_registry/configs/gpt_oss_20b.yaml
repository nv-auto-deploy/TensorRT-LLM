# OpenAI GPT-OSS-20B (32 experts, top-4, MXFP4 quantized) — standalone AD serving config.
# 24 layers (alternating sliding/full), GQA (64 Q / 8 KV heads), head_dim=64, hidden=2880.
# Weights are stored in MXFP4 on HF; AD's quantize_mxfp4_moe transform handles it.
runtime: trtllm
model_factory: AutoModelForCausalLM
attn_backend: trtllm
compile_backend: torch-cudagraph
skip_loading_weights: false
world_size: 1
max_batch_size: 128
max_seq_len: 4096
max_num_tokens: 8192
enable_chunked_prefill: true
cuda_graph_config:
  batch_sizes: [1, 2, 4, 8, 16, 32, 64, 128]
kv_cache_config:
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.8
transforms:
  multi_stream_qkv:
    stage: compile
    enabled: true
  multi_stream_router:
    stage: compile
    enabled: true
  fuse_torch_attention_sinks_path:
    enabled: true
  persist_moe_workspace_tensors:
    stage: compile
    enabled: true
  # Rewrite the [B,S,N,D] -> reshape([B,S,-1]) -> o_proj tail of cached
  # attention into a strict aten.view (no contiguity-check fallback path).
  # Must run AFTER insert_cached_attention; the source op is the cached
  # trtllm_attention_mha_with_cache, not the pre-cache torch_attention.
  fuse_attn_output_view_chain:
    stage: cache_init
    enabled: true
