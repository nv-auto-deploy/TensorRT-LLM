# Configuration for nvidia/Llama-3_3-Nemotron-Super-49B-v1 (DeciLM / Nemotron-NAS)
# Uses the custom DeciLMForCausalLM model implementation registered via
# AutoModelForCausalLMFactory.register_custom_model_cls.

world_size: 8

max_batch_size: 128
max_num_tokens: 2048
max_seq_len: 32768

trust_remote_code: false

cuda_graph_batch_sizes: [1, 2, 4, 8, 16, 32, 64, 128]
