# Configuration for AI21-Jamba-Mini-1.5 (hybrid Mamba v1 + Attention)
# Reduced layers for initial testing (single GPU)

args:
  trust_remote_code: true

  # SSMs do not support cache reuse.
  kv_cache_config:
    enable_block_reuse: false
    free_gpu_memory_fraction: 0.7

  max_batch_size: 128
  max_seq_len: 8192

  model_kwargs:
    num_hidden_layers: 5

  transforms:
    insert_cached_ssm_attention:
      backend: torch_mamba_v1
    compile_model:
      backend: torch-cudagraph
      cuda_graph_batch_sizes: [1, 2, 4, 8, 16, 32, 64, 128]
