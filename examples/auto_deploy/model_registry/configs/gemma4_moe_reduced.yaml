# Reduced Gemma 4 MoE for fast iteration — 6 layers (5 sliding + 1 full covers all block types).
# All other settings identical to gemma4_moe.yaml.
model_factory: Gemma4ForConditionalGeneration
tokenizer: google/gemma-4-26B-A4B-it
attn_backend: triton_paged
compile_backend: torch-cudagraph
cuda_graph_config:
  batch_sizes: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512]
max_num_tokens: 8192
max_batch_size: 512
max_seq_len: 8192
enable_chunked_prefill: true
kv_cache_config:
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.8
model_kwargs:
  text_config:
    num_hidden_layers: 6
transforms:
  compile_model:
    piecewise_enabled: true
  mlir_elementwise_fusion:
    enabled: false
  gather_logits_before_lm_head:
    enabled: true
  fuse_gemms:
    enabled: true
  fuse_gelu_tanh_mul:
    enabled: true
  multi_stream_moe:
    enabled: true
