# Gemma 4 MoE with CUDA persistent megakernel for decode attention.
# Uses the megakernel_bridge (no Mirage dependency) to replace sliding-attention
# sublayers with the persistent CUDA megakernel during decode.
# Requires H100 (sm_90a).
model_factory: Gemma4ForConditionalGeneration
tokenizer: google/gemma-4-26B-A4B-it
attn_backend: triton_paged
compile_backend: torch-simple
cuda_graph_config:
  batch_sizes: []
  max_batch_size: 1
max_num_tokens: 512
max_batch_size: 1
max_seq_len: 512
enable_chunked_prefill: true
model_kwargs:
  text_config:
    num_hidden_layers: 30
kv_cache_config:
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.8
transforms:
  lower_to_mpk:
    enabled: true
    dry_run_only: false
    use_cuda_megakernel: true
    prewarm_decode_executors: true
    debug_dump_plan_path: ./gemma_mpk_plan.json
  compile_model:
    piecewise_enabled: true
  mlir_elementwise_fusion:
    enabled: false
  gather_logits_before_lm_head:
    enabled: true
  fuse_gemms:
    enabled: true
