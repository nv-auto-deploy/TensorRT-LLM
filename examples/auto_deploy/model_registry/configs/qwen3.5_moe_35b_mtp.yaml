# Qwen3.5 MoE 35B one-model MTP speculative decoding.
max_seq_len: 8192
max_num_tokens: 4096
enable_chunked_prefill: false
max_batch_size: 8
cuda_graph_config:
  max_batch_size: 8
  batch_sizes: [1, 2, 3, 4, 5, 6, 7, 8]
model_factory: Qwen3_5MoeForConditionalGeneration
kv_cache_config:
  free_gpu_memory_fraction: 0.7
model_kwargs:
  torch_dtype: bfloat16
speculative_config:
  decoding_type: MTP
  max_draft_len: 6
  mtp_eagle_one_model: true
transforms:
  compile_model:
    piecewise_enabled: false
  initialize_mrope_delta_cache:
    enabled: true
  export_to_gm:
    num_moe_experts_for_export: 2
  fuse_gemms_mixed_children:
    enabled: true
  detect_sharding:
    allreduce_strategy: SYMM_MEM
    shard_all_unprocessed: true
    simple_shard_filter: "lm_head"
    sharding_dims: ['tp','ep', 'bmm']
    sharding_source: ['manual']
    manual_config:
      tp_plan:
        "in_proj_qkv": "delta"
        "q_proj": "colwise"
        "k_proj": "colwise"
        "v_proj": "colwise"
        "o_proj": "rowwise"
  insert_cached_gated_delta_rule:
    backend: fla_gated_delta
  insert_cached_causal_conv:
    backend: triton_causal_conv
  multi_stream_moe:
    stage: compile
    enabled: true
  multi_stream_gemm:
    stage: compile
    enabled: true
  gather_logits_before_lm_head:
    enabled: true
