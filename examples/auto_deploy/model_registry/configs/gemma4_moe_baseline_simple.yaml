# Baseline: standard attention, torch-simple (no CUDA graphs), for fair comparison
model_factory: Gemma4ForConditionalGeneration
tokenizer: google/gemma-4-26B-A4B-it
attn_backend: triton_paged
compile_backend: torch-simple
cuda_graph_config:
  batch_sizes: []
  max_batch_size: 1
max_num_tokens: 512
max_batch_size: 1
max_seq_len: 512
enable_chunked_prefill: true
model_kwargs:
  text_config:
    num_hidden_layers: 30
kv_cache_config:
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.8
transforms:
  lower_to_mpk:
    enabled: true
    dry_run_only: true
  compile_model:
    enabled: false
  mlir_elementwise_fusion:
    enabled: false
  gather_logits_before_lm_head:
    enabled: true
  fuse_gemms:
    enabled: true
